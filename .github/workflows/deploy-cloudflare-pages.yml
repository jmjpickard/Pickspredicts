name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy directory
        id: deploy-dir
        run: |
          DEPLOY_DIR="${{ vars.CLOUDFLARE_PAGES_DEPLOY_DIR }}"
          if [ -z "$DEPLOY_DIR" ]; then
            DEPLOY_DIR="site/dist"
          fi
          echo "deploy_dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"

      - name: Validate Cloudflare config
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          [ -n "$CF_API_TOKEN" ] || { echo "Missing secret CLOUDFLARE_API_TOKEN"; exit 1; }
          [ -n "$CF_ACCOUNT_ID" ] || { echo "Missing secret CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          [ -n "$CF_PROJECT" ] || { echo "Missing variable CLOUDFLARE_PAGES_PROJECT"; exit 1; }

      - name: Setup Node
        if: steps.deploy-dir.outputs.deploy_dir == 'site/dist'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        if: steps.deploy-dir.outputs.deploy_dir == 'site/dist'
        run: npm ci --prefix site

      - name: Build static site
        if: steps.deploy-dir.outputs.deploy_dir == 'site/dist'
        run: npm run build --prefix site

      - name: Check deploy directory exists
        run: |
          test -d "${{ steps.deploy-dir.outputs.deploy_dir }}" || {
            echo "Deploy directory not found: ${{ steps.deploy-dir.outputs.deploy_dir }}"
            exit 1
          }

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ steps.deploy-dir.outputs.deploy_dir }}
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
